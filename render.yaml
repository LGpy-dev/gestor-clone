services:
  - name: gestor-web-pmpa-backend
    type: web
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_NAME
        value: Dev PMPA
      - key: SUPER_CPF
        value: 00000000001
      - key: SUPER_EMAIL
        value: super@gestor-pmpa.local
      - key: SUPER_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
